<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ReuRider Online Market</title>

  <!-- PWA Icons - Chrome Android reads these from THIS page -->
  <link rel="icon" type="image/png" sizes="192x192" href="https://aranaskristoff2-ai.github.io/reurider-assets/icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="https://aranaskristoff2-ai.github.io/reurider-assets/icon.png">
  <link rel="apple-touch-icon" href="https://aranaskristoff2-ai.github.io/reurider-assets/icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ReuRider">
  <meta name="application-name" content="ReuRider">
  <meta name="theme-color" content="#FF6B35">

  <!-- PWA Manifest - inline so no extra file needed -->
  <script>
    var manifest = {
      name: "ReuRider Online Market",
      short_name: "ReuRider",
      description: "ReuRider Online Market - Cashless Dining Portal",
      start_url: window.location.href,
      scope: "./",
      display: "standalone",
      orientation: "portrait",
      background_color: "#FF6B35",
      theme_color: "#FF6B35",
      icons: [
        {
          src: "https://aranaskristoff2-ai.github.io/reurider-assets/icon.png",
          sizes: "192x192",
          type: "image/png",
          purpose: "any maskable"
        },
        {
          src: "https://aranaskristoff2-ai.github.io/reurider-assets/icon.png",
          sizes: "512x512",
          type: "image/png",
          purpose: "any maskable"
        }
      ]
    };
    var blob = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
    var link = document.createElement('link');
    link.rel = 'manifest';
    link.href = URL.createObjectURL(blob);
    document.head.appendChild(link);
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #FF6B35;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Splash screen shown while GAS loads */
    #splash {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #FF6B35 0%, #FF8C00 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.5s ease;
    }

    #splash img {
      width: 140px;
      height: 140px;
      border-radius: 28px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      animation: pulse 1.5s ease-in-out infinite;
    }

    #splash p {
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      margin-top: 20px;
      opacity: 0.85;
      letter-spacing: 1px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    /* The GAS app iframe - fills entire screen */
    #app-frame {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- Splash screen while app loads -->
  <div id="splash">
    <img src="https://aranaskristoff2-ai.github.io/reurider-assets/icon.png" alt="ReuRider">
    <p>Loading ReuRider...</p>
  </div>

  <!-- GAS app loads in full-screen iframe -->
  <iframe
    id="app-frame"
    src="https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec"
    allow="fullscreen"
    allowfullscreen
  ></iframe>

  <script>
    // Hide splash once iframe finishes loading
    var frame = document.getElementById('app-frame');
    var splash = document.getElementById('splash');

    frame.onload = function() {
      setTimeout(function() {
        splash.style.opacity = '0';
        setTimeout(function() {
          splash.style.display = 'none';
        }, 500);
      }, 800);
    };

    // Fallback: hide splash after 5s even if onload doesn't fire
    setTimeout(function() {
      splash.style.opacity = '0';
      setTimeout(function() { splash.style.display = 'none'; }, 500);
    }, 5000);
  </script>

</body>
</html>
